<header class="sp-nav" id="sp-nav" itemscope itemtype="http://schema.org/SiteNavigationElement" aria-label="Main navigation">
  <div class="sp-nav__inner">
    <a class="sp-nav__logo" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/img/logo1.png' | relative_url }}" alt="{{ site.title }}" class="sp-nav__logo-img">
    </a>
    <nav class="sp-nav__links">
      {% for item in site.navigation %}
        <a class="sp-nav__link" href="{{ item.link }}" itemprop="url">
          <span itemprop="name">{{ item.name }}</span>
        </a>
      {% endfor %}
    </nav>
    <button class="sp-nav__toggle" id="sp-nav-toggle" aria-label="메뉴 열기" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
