  <style>
    /* ===== Sticky Nav — pill이 직접 sticky element ===== */
    .sticky-nav {
      position: sticky;
      top: 10px;
      z-index: 100;
      max-width: 440px;
      width: calc(100% - 48px);
      margin: 10px auto;
      height: 50px;
      padding: 0 22px;
      display: flex; align-items: center; justify-content: center; gap: 2.2rem;
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 100px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.09), inset 0 1px 0 rgba(255,255,255,0.8);
    }
    .sticky-nav__inner { display: contents; } /* 투명 wrapper — 자식이 직접 flex item */
    .sticky-nav__logo { display: flex; align-items: center; text-decoration: none; border-bottom: 0; flex-shrink: 0; }
    .sticky-nav__logo-img { height: 26px; width: auto; display: block; }
    .sticky-nav__links { display: flex; align-items: center; gap: 1.8rem; }
    .sticky-nav__link {
      font-size: 0.82rem; font-weight: 600; color: #313237;
      text-decoration: none; border-bottom: 0; letter-spacing: 0.04em;
      position: relative; padding-bottom: 2px; transition: color 0.2s; white-space: nowrap;
    }
    .sticky-nav__link::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: #5b8de3;
      transform: scaleX(0); transform-origin: left; transition: transform 0.25s;
    }
    .sticky-nav__link:hover { color: #5b8de3; border-bottom: 0; }
    .sticky-nav__link:hover::after { transform: scaleX(1); }
    .sticky-nav__toggle {
      display: none; flex-direction: column; gap: 4px;
      background: none; border: none; cursor: pointer; padding: 6px; flex-shrink: 0;
    }
    .sticky-nav__toggle span { display: block; width: 18px; height: 2px; background: #313237; transition: all 0.25s; border-radius: 2px; }
    .sticky-nav__toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .sticky-nav__toggle.open span:nth-child(2) { opacity: 0; }
    .sticky-nav__toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    @media (max-width: 540px) {
      .sticky-nav { max-width: calc(100% - 32px); padding: 0 14px; gap: 0; justify-content: space-between; }
      .sticky-nav__toggle { display: flex; }
      .sticky-nav__links { display: none; }
      .sticky-nav__links.open {
        display: flex; flex-direction: column; align-items: stretch; gap: 0;
        position: absolute; top: 58px; left: 0; right: 0;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border-radius: 16px; border: 1px solid rgba(0,0,0,0.08);
        padding: 0.4rem 0 0.6rem; box-shadow: 0 6px 24px rgba(0,0,0,0.1); overflow: hidden;
      }
      .sticky-nav__link { padding: 0.65rem 1.1rem; }
      .sticky-nav__link::after { display: none; }
    }
    #about, #competencies, #skills, #projects { scroll-margin-top: 70px; }

    /* ===== Fixed Nav (포트폴리오 상세 페이지용) ===== */
    .sp-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      transition: background 0.35s, box-shadow 0.35s;
    }
    .sp-nav.scrolled { background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    .sp-nav__inner {
      max-width: 1100px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 68px;
    }
    .sp-nav__logo { display: flex; align-items: center; text-decoration: none; border-bottom: 0; }
    .sp-nav__logo-img { height: 38px; width: auto; display: block; }
    .sp-nav__links { display: flex; align-items: center; gap: 2.5rem; }
    .sp-nav__link {
      font-size: 0.88rem; font-weight: 600; color: #313237;
      text-decoration: none; border-bottom: 0; letter-spacing: 0.04em;
      position: relative; padding-bottom: 3px; transition: color 0.2s;
    }
    .sp-nav__link:hover { color: #5b8de3; border-bottom: 0; }
    .sp-nav__toggle { display: none; }
    @media (max-width: 767px) {
      .sp-nav__toggle {
        display: flex; flex-direction: column; gap: 5px;
        background: none; border: none; cursor: pointer; padding: 6px;
      }
      .sp-nav__toggle span { display: block; width: 24px; height: 2px; background: #313237; transition: all 0.25s; }
      .sp-nav__links { display: none; }
      .sp-nav__links.open {
        display: flex; flex-direction: column; gap: 0;
        position: absolute; top: 68px; left: 0; right: 0;
        background: #fff; padding: 0.5rem 0 1rem; box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      }
      .sp-nav__link { padding: 0.75rem 1.5rem; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Single-page Hero */
    .sp-hero { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; margin-top: 0; }
    .sp-hero__overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.58); }
    .sp-hero__wrap { position: relative; z-index: 1; text-align: center; padding: 2rem 1rem; max-width: 700px; }
    .sp-hero__title { font-size: 2.6rem; font-weight: 400; color: #4e4f56; margin-bottom: 1.2rem; }
    .sp-hero__title strong { font-weight: 800; }
    @media (min-width: 768px) { .sp-hero__title { font-size: 3.2rem; } }
    .sp-hero__taglines { display: flex; flex-direction: column; gap: 0.3rem; }
    .sp-hero__tagline { opacity: 0; animation: fadeInUp 0.6s ease forwards; font-size: 1rem; color: #555; margin: 0; }
    @media (min-width: 768px) { .sp-hero__tagline { font-size: 1.1rem; } }

    /* Sections */
    .sp-section { padding: 5rem 0; }
    .sp-section--white { background: #fff; }
    .sp-section--gray { background: #ffffff; }
    .sp-section__title { font-size: 1.6rem; font-weight: 800; color: #313237; margin-bottom: 2.5rem; display: block; text-align: center; }

    /* About */
    .sp-about__photo-wrap { display: flex; justify-content: center; margin-bottom: 2.5rem; }
    .sp-about__photo { width: 130px; aspect-ratio: 3/4; object-fit: cover; object-position: top; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .sp-about-grid { display: grid; grid-template-columns: 1fr; gap: 2.5rem; }
    @media (min-width: 768px) { .sp-about-grid { grid-template-columns: 1fr 1fr; } }
    .sp-about__intro p { font-size: 0.95rem; color: #555; line-height: 1.7; margin-bottom: 0.4rem; }
    .sp-about__contact { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.4rem; padding-top: 1.2rem; border-top: 1px solid #eee; }
    .sp-about__contact-link { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #555; text-decoration: none; border-bottom: 0; transition: color 0.2s; }
    .sp-about__contact-link svg { width: 15px; height: 15px; flex-shrink: 0; color: #5b8de3; }
    .sp-about__contact-link:hover { color: #5b8de3; border-bottom: 0; }
    .sp-about__block { margin-bottom: 2rem; }
    .sp-about__block-title { font-size: 0.8rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.8rem; }
    .sp-timeline-item { display: flex; gap: 1rem; margin-bottom: 0.7rem; align-items: flex-start; }
    .sp-timeline-item__year { font-size: 0.78rem; color: #5b8de3; font-weight: 700; white-space: nowrap; min-width: 80px; padding-top: 0.1rem; }
    .sp-timeline-item__content { font-size: 0.9rem; color: #444; line-height: 1.5; }

    /* Competencies */
    .sp-comp-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; max-width: 960px; margin: 0 auto; }
    @media (min-width: 768px) { .sp-comp-grid { grid-template-columns: repeat(3, 1fr); } }
    .sp-comp-card { background: #fff; border-radius: 14px; padding: 2rem 1.6rem; border-top: 3px solid #5b8de3; box-shadow: 0 2px 16px rgba(0,0,0,0.05); }
    .sp-comp-card__num { display: block; font-size: 0.72rem; font-weight: 700; color: #5b8de3; letter-spacing: 0.12em; margin-bottom: 0.9rem; }
    .sp-comp-card__title { font-size: 1rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.75rem; }
    .sp-comp-card__desc { font-size: 0.87rem; color: #666; line-height: 1.75; margin: 0; }

    /* Skills */
    .sp-skills { display: flex; flex-wrap: wrap; gap: 0.7rem; justify-content: center; max-width: 700px; margin: 0 auto; }
    .sp-skill-badge { display: inline-block; border: 2px solid #5b8de3; color: #5b8de3; font-size: 0.85rem; font-weight: 600; padding: 0.35rem 1rem; border-radius: 100px; transition: all 0.2s; }
    .sp-skill-badge:hover { background: #5b8de3; color: #fff; }

    /* Portfolio grid */
    .portfolio-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; padding: 0; max-width: 960px; margin: 0 auto; }
    @media (min-width: 768px) { .portfolio-grid { grid-template-columns: repeat(3, 1fr); } }

    /* Portfolio Card */
    .portfolio-card { background: #fff; border-radius: 16px; overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; flex-direction: column; cursor: pointer; }
    .portfolio-card:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(0,0,0,0.13); }
    .portfolio-card__link { display: flex; flex-direction: column; text-decoration: none; border-bottom: 0; color: inherit; height: 100%; }
    .portfolio-card__link:hover { border-bottom: 0; color: inherit; }
    /* 썸네일: 이미지가 카드 상단을 꽉 채움 */
    .portfolio-card__thumb { position: relative; background: #f0f0f0; height: 200px; overflow: hidden; }
    .portfolio-card__thumb::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.06) 100%); }
    .portfolio-card__logo { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .portfolio-card:hover .portfolio-card__logo { transform: scale(1.04); }
    .portfolio-card__logo-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: 900; color: #5b8de3; letter-spacing: -0.02em; }
    /* 카드 본문 */
    .portfolio-card__body { padding: 1.4rem 1.4rem 1.2rem; flex: 1; display: flex; flex-direction: column; }
    .portfolio-card__title { font-size: 1.15rem; font-weight: 800; color: #1a1a1a; margin-bottom: 0.25rem; letter-spacing: -0.01em; }
    .portfolio-card__subtitle { font-size: 0.78rem; font-weight: 500; color: #888; margin-bottom: 0.6rem; line-height: 1.4; }
    .portfolio-card__description { font-size: 0.86rem; color: #555; line-height: 1.65; flex: 1; margin-bottom: 1rem; }
    .portfolio-card__period { display: none; }
    /* 기술 뱃지 — 기존 스타일 유지 */
    .portfolio-card__tech { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: auto; padding-top: 0.8rem; border-top: 1px solid #f0f0f0; }
    .portfolio-card__badge { background: #e8f0fb; color: #5b8de3; font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 100px; font-weight: 500; }

    /* Portfolio Detail — Hero */
    .pd-hero { background: #313237; padding: 4rem 0 3rem; margin-top: 3.75rem; }
    @media (min-width: 992px) { .pd-hero { margin-top: 0; } }
    .pd-hero__wrap { max-width: 800px; margin: 0 auto; padding: 0 20px; }
    .pd-hero__title { font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 0.5rem; }
    .pd-hero__subtitle { font-size: 1rem; color: rgba(255,255,255,0.75); margin-bottom: 1rem; line-height: 1.6; }
    .pd-hero__period { display: inline-block; background: #5b8de3; color: #fff; font-size: 0.8rem; font-weight: 600; padding: 0.3rem 0.9rem; border-radius: 100px; }

    /* Portfolio Detail — Body */
    .pd-body { padding: 2.5rem 0 3rem; }

    /* 정보 3열 */
    .pd-info-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 2.5rem; }
    @media (min-width: 768px) { .pd-info-grid { grid-template-columns: repeat(3, 1fr); } }
    .pd-info-box { background: #f7f7f7; border-radius: 8px; padding: 1.3rem 1.5rem; border-left: 3px solid #5b8de3; }
    .pd-info-box__label { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.6rem; }
    .pd-info-box p { font-size: 0.92rem; color: #313237; margin-bottom: 0.15rem; font-weight: 500; }
    .pd-tech-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.2rem; }
    .pd-tech-badge { background: #fff; border: 1.5px solid #5b8de3; color: #5b8de3; font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 100px; font-weight: 600; }

    /* 2열 콘텐츠 */
    .pd-content-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; margin-bottom: 2rem; }
    @media (min-width: 768px) { .pd-content-grid { grid-template-columns: 1fr 1fr; } }
    .pd-section__title { font-size: 1.05rem; font-weight: 700; color: #313237; padding-bottom: 0.6rem; border-bottom: 2px solid #5b8de3; margin-bottom: 1.1rem; }
    .pd-list { list-style: none; padding: 0; margin: 0; }
    .pd-list__item { position: relative; padding-left: 1.1rem; font-size: 0.92rem; color: #555; margin-bottom: 0.7rem; line-height: 1.65; }
    .pd-list__item::before { content: "▸"; position: absolute; left: 0; color: #5b8de3; font-size: 0.8rem; top: 0.1rem; }

    /* 갤러리 */
    .pd-gallery { margin-bottom: 2rem; }
    .pd-gallery__grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1rem; }
    @media (min-width: 768px) { .pd-gallery__grid { grid-template-columns: repeat(3, 1fr); } }
    .pd-gallery__item { margin: 0; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .pd-gallery__item img { width: 100%; height: auto; display: block; }

    /* 버튼 */
    .pd-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 2rem; }
    .pd-btn { display: inline-block; padding: 0.7rem 1.5rem; border-radius: 6px; font-size: 0.9rem; font-weight: 600; border-bottom: 0; transition: background 0.2s; }
    .pd-btn--primary { background: #313237; color: #fff; }
    .pd-btn--primary:hover { background: #5b8de3; color: #fff; border-bottom: 0; }
    .pd-btn--secondary { background: #f0f0f0; color: #555; }
    .pd-btn--secondary:hover { background: #e0e0e0; color: #333; border-bottom: 0; }

    /* @media print — PDF 출력용 */
    @media print {
      @page { margin: 1.5cm; }
      .header, .footer, .pd-actions, .pd-gallery { display: none !important; }
      .pd-hero { background: none !important; color: #000 !important; padding: 0 0 1.5rem; margin-top: 0; border-bottom: 2px solid #5b8de3; }
      .pd-hero__title { color: #000 !important; font-size: 1.6rem; }
      .pd-hero__subtitle { color: #444 !important; }
      .pd-hero__period { background: none !important; color: #5b8de3 !important; border: 1px solid #5b8de3; }
      .pd-info-box { box-shadow: none; border: 1px solid #ddd; background: #fff !important; }
      .pd-tech-badge { border-color: #333; color: #333 !important; background: none !important; }
      .pd-list__item { color: #222; }
      .site__content { padding: 0; }
      body { font-size: 0.9rem; }
    }
  </style>
