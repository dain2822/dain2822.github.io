  <style>
    .header__logo .header__logo--container { width: auto !important; overflow: visible !important; }
    .header__logo--img { height: 36px; width: auto; display: block; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero__tagline-line {
      opacity: 0;
      animation: fadeInUp 0.6s ease forwards;
      margin-bottom: 0.4rem;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.85);
    }

    /* Portfolio Section */
    .portfolio-section { background-color: #f9f9f9; padding: 3rem 0; }
    .portfolio-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; padding: 2rem 0; }
    @media (min-width: 768px) { .portfolio-grid { grid-template-columns: repeat(3, 1fr); } }

    /* Portfolio Card */
    .portfolio-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; transition: box-shadow 0.2s, transform 0.2s; display: flex; flex-direction: column; }
    .portfolio-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.12); transform: translateY(-4px); }
    .portfolio-card__link { display: flex; flex-direction: column; text-decoration: none; border-bottom: 0; color: inherit; height: 100%; }
    .portfolio-card__link:hover { border-bottom: 0; color: inherit; }
    .portfolio-card__thumb { background: #f0f0f0; display: flex; align-items: center; justify-content: center; height: 160px; overflow: hidden; }
    .portfolio-card__logo { width: 100%; height: 100%; object-fit: contain; padding: 1rem; }
    .portfolio-card__logo-placeholder { font-size: 3rem; font-weight: 800; color: #e8670a; }
    .portfolio-card__body { padding: 1.4rem; flex: 1; display: flex; flex-direction: column; }
    .portfolio-card__number { font-size: 0.8rem; font-weight: 700; color: #e8670a; margin-bottom: 0.3rem; }
    .portfolio-card__title { font-size: 1.25rem; font-weight: 700; color: #313237; margin-bottom: 0.3rem; }
    .portfolio-card__subtitle { font-size: 0.8rem; color: #666; margin-bottom: 0.3rem; line-height: 1.5; }
    .portfolio-card__period { font-size: 0.78rem; color: #999; margin-bottom: 0.7rem; }
    .portfolio-card__description { font-size: 0.88rem; color: #555; margin-bottom: 1rem; line-height: 1.6; flex: 1; }
    .portfolio-card__tech { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: auto; }
    .portfolio-card__badge { background: #f0f4ff; color: #277cea; font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 100px; font-weight: 500; }

    /* Portfolio Detail */
    .portfolio-detail { padding: 2.5rem 0; }
    .portfolio-detail__number { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 0.3rem; }
    .portfolio-detail__info-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 2.5rem; }
    @media (min-width: 768px) { .portfolio-detail__info-grid { grid-template-columns: repeat(3, 1fr); } }
    .portfolio-detail__info-box { background: #f5f5f5; border-radius: 6px; padding: 1.2rem 1.5rem; }
    .portfolio-detail__info-box h3 { font-size: 0.85rem; font-weight: 700; color: #555; margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .portfolio-detail__info-box p { font-size: 0.95rem; color: #313237; margin-bottom: 0.2rem; }
    .portfolio-detail__content-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; margin-bottom: 2rem; }
    @media (min-width: 768px) { .portfolio-detail__content-grid { grid-template-columns: 1fr 1fr; } }
    .portfolio-detail__section h3 { font-size: 1.1rem; font-weight: 700; color: #313237; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #e8670a; }
    .portfolio-detail__section ul { padding-left: 1.2rem; }
    .portfolio-detail__section li { font-size: 0.95rem; color: #555; margin-bottom: 0.6rem; line-height: 1.6; }
    .portfolio-detail__links { margin-top: 1.5rem; }
    .portfolio-detail__btn { display: inline-block; background: #313237; color: #fff; padding: 0.7rem 1.5rem; border-radius: 6px; font-size: 0.9rem; font-weight: 600; border-bottom: 0; }
    .portfolio-detail__btn:hover { background: #e8670a; color: #fff; border-bottom: 0; }
  </style>
