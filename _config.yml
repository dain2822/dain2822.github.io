description: > # Meta description of Homepage
  심다인(dain2822)의 깃허브 포트폴리오 블로그 
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://dain2822.github.io/" # the base hostname & protocol for your site, e.g. http://example.com

# SEO PLUGIN
social:
  name: Sim DaIn
  links:
    - https://github.com/dain2822

# THEME SETTINGS
navigation: # Navigation links
  - {name: 'Home', link: '/'}
  - {name: 'About', link: '/about'}
  - {name: 'Contact', link: '/contact'}

tagline:
  - "파도는 장애물 앞에서 멈추지 않고 형태를 바꾸며 앞으로 나아갑니다."
  # - "저 또한 새로운 기술과 환경 앞에서 유연하게 적응하며 맡은 기능을 끝까지 완성해왔습니다."
  - "벽에 부딪혀 깨어져도 계속해서 부딪치는 파도처럼,"
  - "실패에 주저하지 않고 끊임없이 배우며 앞으로 나아가겠습니다."

hero_img: asset1.jpg # stored at assets/img/asset1.jpg # Main background image: use the path from /assets/img/ => This will output /assets/img/posts/sleek_lg.jpg

email: dain2822@gmail.com # email for form submission

github_username:  dain2822 # replace with your_github_username or comment to remove link from footer

disqus:
  shortname: dain2822 # to enable comments replace with your_disqus_shortname

# google_tag_manager: GTM-XXXXXXX # Uncomment to enable GTM. Replace GTM-XXXXXXX with your GTM container ID

service_worker: true

# BUILD SETTINGS
markdown: kramdown
highlighter: rouge # or pygments or null
# theme: jekyll-sleek # Uncomment if you're using the theme as a ruby gem
exclude:
  - README.md
  - node_modules
  - script
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - vendor
  - npm-debug.log
  - gulpfile.js
  - sleek.jpg

include: ['_pages']
permalink: /:title/

compress_html:
  clippings: all

collections:
  portfolio:
    output: true
    permalink: /portfolio/:name/
    sort_by: order

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
